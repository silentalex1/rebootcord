<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reboot Cord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;
  --surface:#0f0f0f;
  --surface2:#161616;
  --surface3:#1e1e1e;
  --red:#e63946;
  --red-dark:#c1121f;
  --text:#f4f4f4;
  --text-dim:#8a8a8a;
  --text-muted:#4a4a4a;
  --border:#1f1f1f;
  --border-bright:#2d2d2d;
  --green:#2ec27e;
  --font:'Syne',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,#e6394612,transparent);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,#1f1f1f1a 39px,#1f1f1f1a 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,#1f1f1f1a 39px,#1f1f1f1a 40px);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:32px}
.brand-logo{font-size:28px;font-weight:800;letter-spacing:-0.04em;margin-bottom:6px}
.brand-logo span{color:var(--red)}
.brand-sub{font-size:12px;color:var(--text-muted);font-family:var(--mono);letter-spacing:.08em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:8px;border-radius:7px;background:transparent;border:none;color:var(--text-muted);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.tab-btn.active{background:var(--surface3);color:var(--text)}
.form-title{font-size:16px;font-weight:800;margin-bottom:20px;letter-spacing:-.02em}
.field{margin-bottom:14px}
.field-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:block}
.field-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:.15s}
.field-input:focus{border-color:var(--red);background:var(--surface)}
.field-input::placeholder{color:var(--text-muted)}
.invite-note{font-size:10px;color:var(--text-muted);font-family:var(--mono);margin-top:5px}
.submit-btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:9px;padding:13px;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;transition:.15s;margin-top:4px;letter-spacing:.01em}
.submit-btn:hover{background:var(--red-dark);transform:translateY(-1px)}
.submit-btn:active{transform:translateY(0)}
.msg{margin-top:12px;font-size:12px;text-align:center;padding:10px;border-radius:8px;display:none}
.msg.error{background:#e6394618;color:var(--red);border:1px solid #e6394630;display:block}
.msg.success{background:#2ec27e18;color:var(--green);border:1px solid #2ec27e30;display:block}
.tab-content{display:none}
.tab-content.active{display:block}
.footer-note{text-align:center;margin-top:20px;font-size:11px;color:var(--text-muted);font-family:var(--mono)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2e2e2e;border-radius:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-logo"><span>Reboot</span> Cord</div>
    <div class="brand-sub">Reboot World &nbsp;|&nbsp; Friends Only</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('register')">Create Account</button>
      <button class="tab-btn" onclick="showTab('login')">Login</button>
    </div>

    <div id="register-tab" class="tab-content active">
      <div class="form-title">Create your account</div>
      <div class="field">
        <label class="field-label">Username</label>
        <input class="field-input" id="reg-username" type="text" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input class="field-input" id="reg-password" type="password" placeholder="Enter your password" autocomplete="new-password">
      </div>
      <div class="field">
        <label class="field-label">Invite Code</label>
        <input class="field-input" id="invite-code" type="text" placeholder="rebootcord-xxxxx-xxxxxxx">
        <div class="invite-note">Format: rebootcord-xxxxx-xxxxxxx</div>
      </div>
      <button class="submit-btn" id="reg-btn" onclick="handleRegister()">Create Account</button>
      <div class="msg" id="reg-msg"></div>
    </div>

    <div id="login-tab" class="tab-content">
      <div class="form-title">Login to your account</div>
      <div class="field">
        <label class="field-label">Username</label>
        <input class="field-input" id="login-username" type="text" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input class="field-input" id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="submit-btn" id="login-btn" onclick="handleLogin()">Login</button>
      <div class="msg" id="login-msg"></div>
    </div>
  </div>
  <div class="footer-note">Reboot Cord v2.0 &nbsp;|&nbsp; Invite only</div>
</div>

<script>
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name + '-tab').classList.add('active');
  document.querySelectorAll('.tab-btn')[name === 'register' ? 0 : 1].classList.add('active');
}

function setMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

async function handleRegister() {
  const btn = document.getElementById('reg-btn');
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const invite = document.getElementById('invite-code').value.trim();
  if (!username || !password || !invite) { setMsg('reg-msg', 'All fields are required.', 'error'); return; }
  btn.textContent = 'Creating...';
  btn.disabled = true;
  try {
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, invite })
    });
    const data = await res.json();
    if (data.success) {
      setMsg('reg-msg', 'Account created! Redirecting...', 'success');
      sessionStorage.setItem('rc_user', data.username);
      setTimeout(() => { window.location.href = '/dashboard'; }, 900);
    } else {
      setMsg('reg-msg', data.message, 'error');
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  } catch {
    setMsg('reg-msg', 'Server error. Try again.', 'error');
    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
}

async function handleLogin() {
  const btn = document.getElementById('login-btn');
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  if (!username || !password) { setMsg('login-msg', 'All fields are required.', 'error'); return; }
  btn.textContent = 'Logging in...';
  btn.disabled = true;
  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      setMsg('login-msg', 'Welcome back! Redirecting...', 'success');
      sessionStorage.setItem('rc_user', data.username);
      setTimeout(() => { window.location.href = '/dashboard'; }, 900);
    } else {
      setMsg('login-msg', data.message, 'error');
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  } catch {
    setMsg('login-msg', 'Server error. Try again.', 'error');
    btn.textContent = 'Login';
    btn.disabled = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.querySelector('.tab-content.active');
    if (active && active.id === 'register-tab') handleRegister();
    else handleLogin();
  }
});
</script>
</body>
</html>
